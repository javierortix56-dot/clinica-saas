name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# ---------------------------------------------------------------------------
# Variables de entorno a configurar en el dashboard de Vercel
# (Settings → Environment Variables → Production):
#
#   NEXT_PUBLIC_SUPABASE_URL       URL del proyecto Supabase
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  Clave anon pública de Supabase
#   NEXT_PUBLIC_API_URL            URL del backend NestJS (ej. https://api.tudominio.com)
#
# Secrets de GitHub requeridos (Settings → Secrets → Actions):
#   VERCEL_TOKEN       Token de API de Vercel (vercel.com/account/tokens)
#   VERCEL_ORG_ID      ID del equipo/organización en Vercel
#   VERCEL_PROJECT_ID  ID del proyecto en Vercel
# ---------------------------------------------------------------------------
