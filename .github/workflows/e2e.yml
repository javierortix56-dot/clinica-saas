name: E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RUN_E2E: "true"
      NODE_ENV: "test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run e2e tests
        run: npx jest --testPathPattern=escenarios.e2e --runInBand --forceExit

# Secrets a cargar en GitHub -> Settings -> Secrets and variables -> Actions:
#   DATABASE_URL   - connection string transaction mode (puerto 6543) con ?pgbouncer=true
#   DIRECT_URL     - connection string session mode (puerto 5432)
#   GEMINI_API_KEY - clave con prefijo AIza
